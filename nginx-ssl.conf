# HTTPS server for sortifly.com. This file is copied into
# /etc/nginx/conf.d/ by the entrypoint only after certbot has issued a
# certificate, so nginx never fails to start on a missing cert.
server {
    listen 443 ssl;
    http2 on;
    server_name sortifly.com www.sortifly.com;

    ssl_certificate     /etc/letsencrypt/live/sortifly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sortifly.com/privkey.pem;

    # Modern, secure defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for longer
    location ~* \.(?:css|js|json|map|png|jpg|jpeg|gif|svg|ico|ttf|woff|woff2)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

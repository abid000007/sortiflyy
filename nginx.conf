# HTTP server: serves the ACME (certbot) challenge and redirects everything
# else to HTTPS. This block must always be available so certbot can issue/renew.
server {
    listen 80;
    server_name sortifly.com www.sortifly.com;

    # Let's Encrypt HTTP-01 challenge files are written here by certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}
